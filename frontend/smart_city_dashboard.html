<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Smart City Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f172a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Button Bar - Fixed */
        .button-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px);
            padding: 20px 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border-bottom: 2px solid rgba(59, 130, 246, 0.2);
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .iot-btn {
            background: linear-gradient(135deg, #334155 0%, #475569 100%);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px 25px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .iot-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .iot-btn:hover::before {
            left: 100%;
        }

        .iot-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .iot-btn:active {
            transform: translateY(-2px);
        }

        .iot-btn i {
            font-size: 1.8rem;
            transition: transform 0.3s;
        }

        .iot-btn:hover i {
            transform: scale(1.15) rotate(5deg);
        }

        .btn-control {
            background: linear-gradient(135deg, #64748b 0%, #94a3b8 100%);
            border-color: rgba(148, 163, 184, 0.3);
        }

        .btn-control:hover {
            background: linear-gradient(135deg, #94a3b8 0%, #cbd5e1 100%);
            box-shadow: 0 8px 30px rgba(148, 163, 184, 0.4);
        }

        .btn-environment {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .btn-environment:hover {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            box-shadow: 0 8px 30px rgba(16, 185, 129, 0.5);
        }

        .btn-city {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .btn-city:hover {
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.5);
        }

        .btn-tourist {
            background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%);
            border-color: rgba(167, 139, 250, 0.3);
        }

        .btn-tourist:hover {
            background: linear-gradient(135deg, #a78bfa 0%, #c4b5fd 100%);
            box-shadow: 0 8px 30px rgba(167, 139, 250, 0.5);
        }

        /* Full-width Live View Section - WITH PC CAMERA */
        .live-view-section {
            width: 100%;
            position: relative;
            background: #000;
        }

        .live-view-container {
            position: relative;
            width: 100%;
            height: 70vh;
            min-height: 500px;
            overflow: hidden;
        }

        .live-view-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
            display: none;
            /* Hidden by default, shown as fallback */
        }

        .live-view-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .live-view-container:hover .live-view-video {
            transform: scale(1.05);
        }

        .live-view-container:hover .live-view-img {
            transform: scale(1.05);
        }

        .live-view-label {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 25px 70px;
            border-radius: 20px;
            font-size: 2.5rem;
            font-weight: 700;
            backdrop-filter: blur(30px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
            border: 3px solid rgba(59, 130, 246, 0.5);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .live-view-label:hover {
            transform: translateX(-50%) translateY(-5px);
            box-shadow: 0 20px 50px rgba(59, 130, 246, 0.4);
        }

        /* Weather Widget */
        .weather-widget {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 30px 35px;
            color: white;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            border: 3px solid rgba(59, 130, 246, 0.5);
            min-width: 220px;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .weather-widget:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(59, 130, 246, 0.4);
            border-color: rgba(59, 130, 246, 0.7);
        }

        .weather-icon {
            font-size: 3.5rem;
            text-align: center;
            margin-bottom: 12px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .weather-temp {
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            color: #60a5fa;
        }

        .weather-desc {
            text-align: center;
            font-size: 1.2rem;
            opacity: 0.95;
            margin-bottom: 18px;
            color: #cbd5e1;
        }

        .weather-details {
            font-size: 1rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-top: 18px;
            border-top: 2px solid rgba(255, 255, 255, 0.2);
        }

        .weather-detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #e2e8f0;
        }

        .weather-detail-item i {
            color: #60a5fa;
            margin-right: 8px;
        }

        /* Full-width Map Section */
        .map-section {
            width: 100%;
            background: #0f172a;
            padding: 40px 0;
        }

        .map-controls {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 30px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .city-selector-label {
            color: #cbd5e1;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .city-selector {
            padding: 16px 35px;
            font-size: 1.15rem;
            border: 3px solid #3b82f6;
            border-radius: 14px;
            background: rgba(30, 41, 59, 0.95);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 280px;
        }

        .city-selector:hover {
            border-color: #60a5fa;
            background: rgba(59, 130, 246, 0.15);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        .city-selector:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.25);
        }

        /* Location Filter Dropdown */
        .location-filter-container {
            max-width: 1600px;
            margin: 0 auto 30px;
            padding: 0 30px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
        }

        .location-filter-label {
            color: #cbd5e1;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .location-filter-label i {
            color: #60a5fa;
            font-size: 1.4rem;
        }

        .location-selector {
            padding: 14px 30px;
            font-size: 1.1rem;
            border: 2px solid #3b82f6;
            border-radius: 40px;
            background: rgba(30, 41, 59, 0.95);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 350px;
            backdrop-filter: blur(10px);
        }

        .location-selector:hover {
            border-color: #60a5fa;
            background: rgba(59, 130, 246, 0.2);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        .location-selector:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.25);
        }

        .location-selector option {
            background: #1e293b;
            color: white;
            padding: 12px;
        }

        /* Full-width Map Container */
        .map-container {
            width: 100%;
            height: 80vh;
            min-height: 600px;
            position: relative;
            overflow: hidden;
        }

        .google-map-embed {
            width: 100%;
            height: 100%;
            border: 0;
            filter: brightness(0.95) contrast(1.05);
        }

        /* Map Info Overlay */
        .map-info-overlay {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .city-info-card {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px 40px;
            border: 3px solid #3b82f6;
            color: white;
            display: flex;
            gap: 35px;
            flex-wrap: wrap;
            justify-content: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
            transition: all 0.3s ease;
        }

        .city-info-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(59, 130, 246, 0.4);
            border-color: #60a5fa;
        }

        .city-info-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .city-info-item i {
            color: #60a5fa;
            font-size: 1.3rem;
        }

        /* Map Legend - Interactive Icon Keys */
        .map-legend {
            max-width: 1600px;
            margin: 30px auto 0;
            padding: 0 30px;
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .legend-icon-key {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: rgba(30, 41, 59, 0.8);
            padding: 20px 30px;
            border-radius: 60px;
            border: 2px solid rgba(59, 130, 246, 0.3);
            font-weight: 600;
            color: #cbd5e1;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            backdrop-filter: blur(8px);
            min-width: 140px;
        }

        .legend-icon-key:hover {
            transform: translateY(-8px);
            border-color: #60a5fa;
            background: rgba(59, 130, 246, 0.2);
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.4);
        }

        .key-main-icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 4px 10px currentColor);
        }

        .key-features {
            display: flex;
            gap: 15px;
            margin-top: 5px;
            font-size: 1rem;
        }

        .key-features span {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
        }

        .key-features i {
            font-size: 0.9rem;
        }

        /* Individual key colors */
        .key-hospital .key-main-icon {
            color: #ef4444;
        }

        .key-hospital .key-features span {
            color: #fca5a5;
            border: 1px solid #ef4444;
        }

        .key-hotel .key-main-icon {
            color: #3b82f6;
        }

        .key-hotel .key-features span {
            color: #93c5fd;
            border: 1px solid #3b82f6;
        }

        .key-police .key-main-icon {
            color: #10b981;
        }

        .key-police .key-features span {
            color: #6ee7b7;
            border: 1px solid #10b981;
        }

        .key-restaurant .key-main-icon {
            color: #f59e0b;
        }

        .key-restaurant .key-features span {
            color: #fcd34d;
            border: 1px solid #f59e0b;
        }

        /* Location highlight animation */
        @keyframes locationPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(59, 130, 246, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
            }
        }

        .location-highlight {
            animation: locationPulse 2s infinite;
        }

        /* Camera Controls */
        .camera-controls {
            position: absolute;
            bottom: 120px;
            right: 30px;
            z-index: 20;
            display: flex;
            gap: 15px;
        }

        .camera-control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .camera-control-btn:hover {
            transform: scale(1.1);
            background: rgba(59, 130, 246, 0.8);
            border-color: white;
        }

        /* Responsive Design */
        @media (max-width: 1200px) {
            .button-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .iot-btn {
                padding: 18px 20px;
                font-size: 1rem;
            }

            .iot-btn i {
                font-size: 1.6rem;
            }

            .legend-icon-key {
                padding: 15px 20px;
                min-width: 120px;
            }

            .location-filter-container {
                flex-direction: column;
                align-items: flex-start;
            }

            .location-selector {
                min-width: 100%;
            }
        }

        @media (max-width: 768px) {
            .button-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .button-bar {
                padding: 15px 0;
            }

            .live-view-container {
                height: 50vh;
                min-height: 400px;
            }

            .live-view-label {
                font-size: 1.8rem;
                padding: 20px 40px;
                bottom: 30px;
            }

            .weather-widget {
                top: 20px;
                right: 20px;
                padding: 20px 25px;
                min-width: 180px;
            }

            .weather-icon {
                font-size: 2.5rem;
            }

            .weather-temp {
                font-size: 2.2rem;
            }

            .weather-desc {
                font-size: 1rem;
            }

            .map-container {
                height: 60vh;
                min-height: 450px;
            }

            .map-controls {
                flex-direction: column;
                gap: 15px;
                padding: 0 20px 20px;
            }

            .city-selector {
                width: 100%;
                max-width: 350px;
            }

            .location-selector {
                width: 100%;
                min-width: auto;
            }

            .city-info-card {
                padding: 15px 25px;
                gap: 20px;
            }

            .city-info-item {
                font-size: 0.95rem;
            }

            .map-legend {
                gap: 15px;
            }

            .legend-icon-key {
                padding: 12px 15px;
                font-size: 0.9rem;
            }

            .key-main-icon {
                font-size: 2rem;
            }

            .key-features {
                flex-wrap: wrap;
                justify-content: center;
            }

            .camera-controls {
                bottom: 90px;
                right: 20px;
            }
        }

        @media (max-width: 480px) {
            .live-view-label {
                font-size: 1.4rem;
                padding: 15px 30px;
            }

            .weather-widget {
                min-width: 150px;
                padding: 15px 20px;
            }

            .city-info-card {
                flex-direction: column;
                gap: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <!-- Top Button Bar - Updated with correct links and names -->
        <div class="button-bar">
            <div class="button-grid">
                <button class="iot-btn btn-control" onclick="window.location.href='auto_control.html'">
                    <i class="fas fa-cog"></i>
                    <span>Auto Control</span>
                </button>
                <button class="iot-btn btn-environment" onclick="window.location.href='smart_city_env.html'">
                    <i class="fas fa-leaf"></i>
                    <span>Environment Monitoring</span>
                </button>
                <button class="iot-btn btn-city" onclick="window.location.href='smart_city_locations.html'">
                    <i class="fas fa-map-marked-alt"></i>
                    <span>City Location Modes</span>
                </button>
                <button class="iot-btn btn-tourist" onclick="window.location.href='smart_city_tour.html'">
                    <i class="fas fa-map-marked-alt"></i>
                    <span>Tourist Guide</span>
                </button>
            </div>
        </div>

        <!-- Full-width Live View - NOW WITH PC CAMERA -->
        <div class="live-view-section">
            <div class="live-view-container">
                <!-- PC Camera Video Feed -->
                <video id="pcCameraFeed" class="live-view-video" autoplay playsinline></video>

                <!-- Fallback Image (shown if camera fails) -->
                <img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2?q=80&w=2400"
                    alt="Downtown Kigali" class="live-view-img" id="cityImage">

                <!-- Camera Controls -->
                <div class="camera-controls">
                    <button class="camera-control-btn" onclick="toggleCamera()" title="Restart Camera">
                        <i class="fas fa-camera-retake"></i>
                    </button>
                    <button class="camera-control-btn" onclick="takeSnapshot()" title="Take Snapshot">
                        <i class="fas fa-camera"></i>
                    </button>
                </div>

                <div class="weather-widget">
                    <div class="weather-icon">☀️</div>
                    <div class="weather-temp">24°C</div>
                    <div class="weather-desc">Partly Cloudy</div>
                    <div class="weather-details">
                        <div class="weather-detail-item">
                            <span><i class="fas fa-wind"></i> Wind</span>
                            <span>12 km/h</span>
                        </div>
                        <div class="weather-detail-item">
                            <span><i class="fas fa-tint"></i> Humidity</span>
                            <span>65%</span>
                        </div>
                        <div class="weather-detail-item">
                            <span><i class="fas fa-eye"></i> Visibility</span>
                            <span>10 km</span>
                        </div>
                    </div>
                </div>

                <div class="live-view-label" id="cityLabel">Downtown Live View</div>
            </div>
        </div>

        <!-- Full-width Map Section -->
        <div class="map-section">
            <div class="map-controls">
                <span class="city-selector-label">📍 Select City:</span>
                <select id="citySelect" class="city-selector">
                    <option value="kigali" selected>Kigali, Rwanda</option>
                    <option value="nairobi">Nairobi, Kenya</option>
                    <option value="addis">Addis Ababa, Ethiopia</option>
                    <option value="kampala">Kampala, Uganda</option>
                    <option value="dar">Dar es Salaam, Tanzania</option>
                    <option value="lagos">Lagos, Nigeria</option>
                    <option value="cairo">Cairo, Egypt</option>
                    <option value="cape">Cape Town, South Africa</option>
                </select>
            </div>

            <!-- Location Filter Dropdown -->
            <div class="location-filter-container">
                <span class="location-filter-label">
                    <i class="fas fa-map-pin"></i>
                    Filter by Landmark:
                </span>
                <select id="locationSelect" class="location-selector">
                    <option value="">📍 Select a popular place...</option>
                </select>
            </div>

            <!-- Full-width Map Container -->
            <div class="map-container">
                <iframe class="google-map-embed" id="googleMap"
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3987.475553657662!2d30.06051431475393!3d-1.953587998560952!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x19dca6b2feb1c6e5%3A0x6b9c8b5d3c8f5a0!2sKigali%2C%20Rwanda!5e0!3m2!1sen!2s!4v1647889012345!5m2!1sen!2s"
                    allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                </iframe>

                <!-- City Information Overlay on Map -->
                <div class="map-info-overlay">
                    <div class="city-info-card">
                        <div class="city-info-item">
                            <i class="fas fa-building"></i>
                            <span id="cityPopulation">Population: 1.2M</span>
                        </div>
                        <div class="city-info-item">
                            <i class="fas fa-industry"></i>
                            <span id="cityIndustries">Industrial Parks: 3</span>
                        </div>
                        <div class="city-info-item">
                            <i class="fas fa-hotel"></i>
                            <span id="cityHotels">Hotels: 150+</span>
                        </div>
                        <div class="city-info-item">
                            <i class="fas fa-hospital"></i>
                            <span id="cityHospitals">Hospitals: 24</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Map Legend - Interactive Icon Keys with Features -->
            <div class="map-legend">
                <div class="legend-icon-key key-hospital" onclick="filterByCategory('hospital')">
                    <span class="key-main-icon">🏥</span>
                    <span>Hospitals</span>

        // ==================== PC CAMERA SETUP ====================
        let cameraStream = null;
        const videoElement = document.getElementById('pcCameraFeed');
        const fallbackImage = document.getElementById('cityImage');
        const cityLabel = document.getElementById('cityLabel');

        // Start PC camera automatically
        async function startCamera() {
            try {
                if (cameraStream) {
                    cameraStream.getTracks().forEach(track => track.stop());
                }

                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        facingMode: 'user' // Use front camera
                    }
                });

                if (videoElement) {
                    videoElement.srcObject = cameraStream;
                    videoElement.style.display = 'block';
                    if (fallbackImage) fallbackImage.style.display = 'none';
                }

                console.log('✅ PC Camera started');
            } catch (error) {
                console.error('❌ Camera error:', error);
                if (videoElement) videoElement.style.display = 'none';
                if (fallbackImage) fallbackImage.style.display = 'block';
            }
        }

        // Toggle camera function
        window.toggleCamera = function () {
            startCamera();
        };

        // Take snapshot function
        window.takeSnapshot = function () {
            if (!cameraStream) {
                alert('Camera not active');
                return;
            }

            // Create a canvas to capture the current frame
            const canvas = document.createElement('canvas');
            canvas.width = videoElement.videoWidth;
            canvas.height = videoElement.videoHeight;
            canvas.getContext('2d').drawImage(videoElement, 0, 0);

            // Create download link
            const link = document.createElement('a');
            link.download = `snapshot-${new Date().toISOString()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();

            showNotification('📸 Snapshot saved!');
        };

        // Start camera when page loads
        setTimeout(startCamera, 1000);

        // ==================== EXISTING CITY DATA FUNCTIONS ====================
        // DOM elements
        const citySelect = document.getElementById('citySelect');
        const locationSelect = document.getElementById('locationSelect');
        const mapFrame = document.getElementById('googleMap');
        const cityImage = document.getElementById('cityImage');

        // Initialize
        let currentCity = 'kigali';
        let originalMapUrl = cityData.kigali.mapUrl;
        updateLocationOptions(currentCity);

        // City selector change handler
        citySelect.addEventListener('change', function () {
            currentCity = this.value;
            const city = cityData[currentCity];

            // Store original map URL for this city
            originalMapUrl = city.mapUrl;

            // Update map
            mapFrame.src = city.mapUrl;

            // Update city info
            document.getElementById('cityPopulation').textContent = `Population: ${city.info.population}`;
            document.getElementById('cityIndustries').textContent = `Industrial Parks: ${city.info.industries}`;
            document.getElementById('cityHotels').textContent = `Hotels: ${city.info.hotels}`;
            document.getElementById('cityHospitals').textContent = `Hospitals: ${city.info.hospitals}`;

            // Update image and label (only used if camera fails)
            cityImage.src = city.imageUrl;
            cityLabel.textContent = city.label;

            // Update location dropdown
            updateLocationOptions(currentCity);

            // Show notification
            showNotification(`📍 Switched to ${city.name}`);
        });

        // Update location dropdown based on selected city
        function updateLocationOptions(cityKey) {
            const city = cityData[cityKey];
            locationSelect.innerHTML = '<option value="">📍 Select a popular place...</option>';

            city.landmarks.forEach(landmark => {
                const option = document.createElement('option');
                option.value = landmark.value;
                option.textContent = landmark.label;
                option.dataset.mapUrl = landmark.mapUrl;
                option.dataset.category = landmark.category;
                locationSelect.appendChild(option);
            });
        }

        // Location filter function
        locationSelect.addEventListener('change', function () {
            const selectedOption = this.options[this.selectedIndex];

            if (!this.value) {
                // Reset to city view
                mapFrame.src = cityData[currentCity].mapUrl;
                showNotification('📍 Showing full city map');
                return;
            }

            const mapUrl = selectedOption.dataset.mapUrl;
            const label = selectedOption.textContent;

            // Update map to show the specific location
            mapFrame.src = mapUrl;

            // Show notification
            showNotification(`📍 ${label} - Showing exact location`);

            // Visual feedback
            this.classList.add('location-highlight');
            setTimeout(() => this.classList.remove('location-highlight'), 2000);
        });

        // Filter by category function for legend keys
        window.filterByCategory = function (category) {
            const city = cityData[currentCity];
            const categoryMap = {
                'hospital': '🏥',
                'hotel': '🏨',
                'police': '🚔',
                'restaurant': '🍽️'
            };

            // Find landmarks matching the category
            const matchingLandmarks = city.landmarks.filter(l =>
                (category === 'hospital' && l.label.includes('Hospital')) ||
                (category === 'hotel' && l.label.includes('Hotel')) ||
                (category === 'restaurant' && (l.label.includes('Restaurant') || l.label.includes('Café') || l.label.includes('Market'))) ||
                (category === 'police' && l.label.includes('Police'))
            );

            if (matchingLandmarks.length > 0) {
                // Show first matching landmark
                mapFrame.src = matchingLandmarks[0].mapUrl;
                showNotification(`${categoryMap[category]} Showing ${category}s in ${city.name}`);
            } else {
                showNotification(`${categoryMap[category]} No specific ${category}s found, showing general map`);
            }
        };

        // Dynamic weather update
        function updateWeather() {
            const conditions = [
                { icon: '☀️', temp: 24, desc: 'Sunny' },
                { icon: '⛅', temp: 23, desc: 'Partly Cloudy' },
                { icon: '☁️', temp: 22, desc: 'Cloudy' },
                { icon: '🌤️', temp: 25, desc: 'Clear' },
                { icon: '🌦️', temp: 21, desc: 'Light Rain' }
            ];

            const random = conditions[Math.floor(Math.random() * conditions.length)];

            document.querySelector('.weather-temp').textContent = random.temp + '°C';
            document.querySelector('.weather-desc').textContent = random.desc;
            document.querySelector('.weather-icon').textContent = random.icon;
        }

        // Update weather every 10 seconds
        setInterval(updateWeather, 10000);

        // Button click handlers with smooth feedback
        document.querySelectorAll('.iot-btn, .legend-icon-key').forEach(btn => {
            btn.addEventListener('click', (e) => {
                btn.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    btn.style.transform = '';
                }, 150);
            });
        });

        // Simple notification system
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 100px;
                right: 30px;
                background: linear-gradient(135deg, #3b82f6, #60a5fa);
                color: white;
                padding: 20px 30px;
                border-radius: 12px;
                font-weight: 600;
                font-size: 1.1rem;
                box-shadow: 0 15px 40px rgba(59, 130, 246, 0.6);
                z-index: 10000;
                animation: slideIn 0.3s ease;
                border: 2px solid rgba(255, 255, 255, 0.3);
                backdrop-filter: blur(10px);
            `;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 2500);
        }

        // Add animation keyframes
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(400px); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(400px); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Make functions available globally
        window.showNotification = showNotification;

        // Clean up camera when page unloads
        window.addEventListener('beforeunload', function () {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
            }
        });
    </script>

    <!-- Hub Navigation Button -->
    <div style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;">
        <a href="all_in_one.html"
            style="display: flex; align-items: center; gap: 8px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-decoration: none; padding: 12px 24px; border-radius: 50px; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 600; font-size: 16px; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); transition: all 0.3s ease;"
            onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 8px 25px rgba(102, 126, 234, 0.6)';"
            onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(102, 126, 234, 0.4)';">
            <span style="font-size: 20px;">🏠</span>
            <span>HUB</span>
        </a>
    </div>
</body>
